<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Inkland app icon — original art. Dark slate tile, azure ink blob mascot
       with a claimed-territory swoosh behind it. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2030"/>
      <stop offset="1" stop-color="#10131d"/>
    </linearGradient>
    <linearGradient id="blob" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#54a4ff"/>
      <stop offset="1" stop-color="#2f7ef2"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- claimed territory swoosh -->
  <path d="M60 340 Q 120 210 256 232 Q 400 254 452 160 L 452 452 Q 452 452 60 452 Z"
        fill="#2f7ef2" opacity="0.22"/>
  <path d="M60 388 Q 150 300 256 316 Q 380 334 452 268 L 452 452 Q 452 452 60 452 Z"
        fill="#2f7ef2" opacity="0.30"/>
  <!-- trail behind the blob -->
  <rect x="96" y="238" width="150" height="52" rx="26" fill="#8fc2ff" opacity="0.85"/>
  <!-- ink blob body -->
  <circle cx="312" cy="264" r="118" fill="url(#blob)"/>
  <circle cx="312" cy="264" r="118" fill="none" stroke="#8fc2ff" stroke-width="10" opacity="0.55"/>
  <!-- eyes looking ahead-right -->
  <circle cx="288" cy="238" r="34" fill="#ffffff"/>
  <circle cx="360" cy="238" r="34" fill="#ffffff"/>
  <circle cx="298" cy="242" r="16" fill="#141824"/>
  <circle cx="370" cy="242" r="16" fill="#141824"/>
  <!-- little smile -->
  <path d="M300 312 Q 326 334 352 312" fill="none" stroke="#141824" stroke-width="12" stroke-linecap="round"/>
  <!-- drip -->
  <path d="M240 356 q -10 26 8 34 q 20 8 24 -14 q 2 -14 -12 -26 z" fill="#2f7ef2"/>
</svg>
